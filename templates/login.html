<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AVALON AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0F4FF 0%, #F6F0FF 100%);
            margin: 0;
            padding: 0;
        }

        .login-card {
            background: #FFFFFF;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .login-card h1 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .brand-logo {
            font-weight: 700;
            font-size: 2.5rem;
            color: #106263;
            margin-bottom: 30px;
            display: block;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .error-msg {
            background: #FFF5F5;
            color: #C53030;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--accent-red);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <span class="brand-logo">AVALON</span>
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access AI Planning</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary"
                style="width: 100%; margin-top: 20px; font-size: 1.1rem; background: var(--accent-purple); color: white;">
                Sign In to AVALON
            </button>
        </form>
    </div>
</body>

</html>
